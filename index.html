<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>كشف أمراض النبات بالذكاء الاصطناعي</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: Tahoma; background:#f4f7f5; margin:0; padding:0; }
        header { background:#2e7d32; color:white; padding:20px; text-align:center; }
        .container { max-width:900px; margin:20px auto; background:white; padding:20px; border-radius:10px; }
        .upload-box { border:2px dashed #81c784; padding:20px; text-align:center; border-radius:10px; }
        button { background:#2e7d32; color:white; border:none; padding:10px 20px; border-radius:5px; margin-top:10px; }
        .preview img { max-width:100%; margin-top:10px; border-radius:10px; }
        .result { background:#e8f5e9; padding:15px; border-radius:10px; margin-top:20px; }
        footer { text-align:center; padding:15px; background:#e8f5e9; margin-top:30px; }
    </style>
</head>
<body>

<header>
    <h1>منصة كشف أمراض النبات بالذكاء الاصطناعي</h1>
    <p>ارفع صورة لمحصولك ودع الذكاء الاصطناعي يحلل المرض</p>
</header>

<div class="container">
    <div class="upload-box">
        <p>اختر صورة واضحة للأوراق أو الثمار</p>
        <input type="file" id="imageInput" accept="image/*">
        <button id="analyzeBtn" disabled>تحليل الصورة</button>
        <p id="status"></p>
    </div>

    <div class="preview" id="preview" style="display:none;">
        <h3>معاينة الصورة</h3>
        <img id="previewImg">
    </div>

    <div class="result" id="result" style="display:none;">
        <h3>نتيجة التحليل</h3>
        <p><strong>المرض:</strong> <span id="disease"></span></p>
        <p><strong>الدقة:</strong> <span id="confidence"></span></p>
        <p><strong>ملاحظة:</strong> التحليل تجريبي وقد لا يكون دقيق 100٪</p>
    </div>
</div>

<footer>
    صُمِّم من قبل المهندس أحمد علي عمران ©2026<br>
    جميع الحقوق محفوظة 2026
</footer>

<script>
const imageInput = document.getElementById("imageInput");
const analyzeBtn = document.getElementById("analyzeBtn");
const statusMsg = document.getElementById("status");
const preview = document.getElementById("preview");
const previewImg = document.getElementById("previewImg");
const resultBox = document.getElementById("result");
const diseaseEl = document.getElementById("disease");
const confidenceEl = document.getElementById("confidence");

let selectedFile = null;

imageInput.addEventListener("change", () => {
    selectedFile = imageInput.files[0];
    analyzeBtn.disabled = !selectedFile;

    const reader = new FileReader();
    reader.onload = e => {
        previewImg.src = e.target.result;
        preview.style.display = "block";
    };
    reader.readAsDataURL(selectedFile);
});

analyzeBtn.addEventListener("click", async () => {
    if (!selectedFile) return;

    statusMsg.textContent = "جاري تحليل الصورة...";
    resultBox.style.display = "none";

    const formData = new FormData();
    formData.append("file", selectedFile);

    try {
        const response = await fetch(
            "https://api-inference.huggingface.co/models/nateraw/plant-disease-classification",
            {
                method: "POST",
                headers: {
                    "Authorization": "Bearer YOUR_API_KEY_HERE"
                },
                body: formData
            }
        );

        const data = await response.json();

        if (data.error) {
            statusMsg.textContent = "النموذج يحتاج وقت ليشتغل، حاول بعد 20 ثانية.";
            return;
        }

        const top = data[0];
        diseaseEl.textContent = top.label;
        confidenceEl.textContent = (top.score * 100).toFixed(2) + "%";

        resultBox.style.display = "block";
        statusMsg.textContent = "تم التحليل بنجاح.";

    } catch (err) {
        statusMsg.textContent = "حدث خطأ أثناء التحليل.";
    }
});
</script>

</body>
</html>
